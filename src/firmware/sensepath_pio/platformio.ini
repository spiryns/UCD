; ═══════════════════════════════════════════════════════
; SensePath PlatformIO project
; XIAO ESP32-S3 + DRV2605L + MAX98357A + MG90S + HOTUT
; Twee environments: USB-C en OTA via WiFi
; ═══════════════════════════════════════════════════════

[platformio]
default_envs = ota
; Build-output BUITEN OneDrive zetten om sync-overhead te vermijden:
build_dir = C:/Users/sampi/AppData/Local/PlatformIO/Builds/SensePath

[env]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
monitor_port = COM3
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    adafruit/Adafruit DRV2605 Library
    madhephaestus/ESP32Servo

; --- USB-C upload (eerste keer of recovery) ---
[env:usb]
upload_port = COM3

; --- OTA upload via WiFi (na eerste flash) ---
[env:ota]
upload_protocol = espota
upload_port = 192.168.3.130
; upload_flags = --auth=ota-deploy-2026   ; uncomment als je OTA-wachtwoord hebt
