; ═══════════════════════════════════════════════════════
; SensePath firmware — multi-module project
;   handle_*      → XIAO ESP32-S3 (tech-handvat)
;   controller_*  → XIAO ESP32-C3 (Wizard-of-Oz controller, later)
;
; Eerste flash altijd via USB-C (env *_usb). Daarna draadloos via OTA
; (env *_ota), zolang XIAO en PC op hetzelfde WiFi zitten.
; ═══════════════════════════════════════════════════════

[platformio]
src_dir = .
; default op de USB-build zodat een verse XIAO meteen geflasht kan worden
default_envs = handle_usb

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
; shared/ bevat protocol.h dat handvat en controller later delen
build_flags = -I shared

; ─── HANDVAT (XIAO ESP32-S3) ─────────────────────────────
[handle_base]
board = seeed_xiao_esp32s3
build_src_filter = +<handle/>
lib_deps =
    adafruit/Adafruit DRV2605 Library
    madhephaestus/ESP32Servo
build_flags =
    ${env.build_flags}
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; eerste flash + recovery via USB-C
[env:handle_usb]
extends = handle_base

; draadloze updates na de eerste USB-flash
[env:handle_ota]
extends = handle_base
upload_protocol = espota
upload_port = sensepath-handle.local
; upload_flags = --auth=<ota-wachtwoord>   ; alleen als je OTA-auth instelt

; ─── CONTROLLER (XIAO ESP32-C3) ──────────────────────────
[env:controller_usb]
board = seeed_xiao_esp32c3
build_src_filter = +<controller/>
build_flags = ${env.build_flags}
